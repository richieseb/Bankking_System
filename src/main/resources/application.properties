# ===================================================================
# 1. SERVER CONFIGURATION
# ===================================================================
# Defines the port your application will run on locally (default is 8080)
server.port=8080

# ===================================================================
# 2. THYMELEAF TEMPLATE ENGINE CONFIGURATION
# ===================================================================
# Disables view caching so changes to your HTML files take effect instantly without restarting the server
spring.thymeleaf.cache=false
# Ensures Thymeleaf looks for HTML templates in the correct default directory
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ===================================================================
# 3. APPLICATION LOGGING LEVELS
# ===================================================================
# Sets logging levels so you can see clean Spring Boot initialization data in your console terminal
logging.level.org.springframework.web=INFO
logging.level.com.bmsce.banking=DEBUG
