<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>BMSCE Bank - Welcome</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f5f6fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 380px; text-align: center; }
        h2 { color: #2c3e50; margin-bottom: 20px; border-bottom: 2px solid #3498db; padding-bottom: 8px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #dcdde1; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #3498db; border: none; color: white; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
        button:hover { background-color: #2980b9; }
        .error-msg { color: #e74c3c; font-size: 14px; margin-top: 10px; }
        .divider { margin: 25px 0; border-top: 1px dashed #dcdde1; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Create Account</h2>
        <form action="/create-account" method="POST">
            <input type="text" name="fullName" placeholder="Full Name" required />
            <input type="password" name="pin" placeholder="4-digit PIN" maxlength="4" required />
            <input type="number" name="initialBalance" placeholder="Initial Balance" step="0.01" required />
            <button type="submit">Create Account</button>
        </form>

        <div class="divider"></div>

        <h2>Login</h2>
        <form action="/login" method="POST">
            <input type="number" name="accountNumber" placeholder="Account Number" required />
            <input type="password" name="pin" placeholder="PIN" maxlength="4" required />
            <button type="submit" style="background-color: #2ecc71;">Login</button>
        </form>
        <div th:if="${loginError}" class="error-msg" th:text="${loginError}"></div>
    </div>
</body>
</html>
